{% extends "base.html" %}

{% block title %}Delete Resident{% endblock %}

{% block content %}
<section class="form-panel">
    <h1>Delete Resident</h1>
    <p>Are you sure you want to delete {{ object.full_name }}?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Delete</button>
        <a href="{{ object.get_absolute_url }}">Cancel</a>
    </form>
</section>
{% endblock %}
